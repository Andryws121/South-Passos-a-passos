<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Conhecimento - South Tecnologia</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/script.js" defer></script>
</head>
<body>

<div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #dceefb; z-index: 2000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px);">
    <div class="card" style="width: 90%; max-width: 400px; text-align: center; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.5);">
        <img src="logo.png" style="height: 90px; width: 90px; border-radius: 50%; margin-bottom: 15px; background: white; padding: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.12); object-fit: contain; border: 1px solid rgba(0,0,0,0.05);">
        <h2 style="color: #1e3a8a; margin-bottom: 10px; font-weight: 800;">Acesso Restrito</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Digite a senha do setor para acessar a Central.</p>
        
        <form id="formLoginSetor" onsubmit="event.preventDefault(); verificarAcesso();">
            <input type="text" name="username" value="Setor_South" autocomplete="username" style="position: absolute; opacity: 0; left: -9999px;">
            
            <div style="position: relative; width: 100%;">
                <input type="password" id="senhaAdmin" name="password" placeholder="Senha de Acesso" autocomplete="current-password" required
                       style="text-align: center; font-size: 18px; letter-spacing: 3px; border: 1.5px solid #e2e8f0; padding: 15px; width: 100%; border-radius: 8px; background: #f8fafc; color: #333; padding-right: 80px;">
                <span id="togglePassword" onclick="alternarSenha()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 14px; font-weight: bold; color: #2563eb; user-select: none;">Mostrar</span>
            </div>
            <button type="submit" style="margin-top: 15px; width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.04);">Entrar no Sistema</button>
        </form>
        <p id="erroSenha" style="color: #ef4444; font-size: 13px; margin-top: 10px; display: none; font-weight: bold;">Senha incorreta!</p>
    </div>
</div>

<div class="main-wrapper" style="display: none;">
    <header class="header-south" style="position: relative; width: 100%;">
        <button onclick="sairDoSistema()" style="position: absolute; right: 10px; top: 0; width: auto; padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;">Sair do Sistema</button>
        
        <img src="logo.png" alt="South Tecnologia" class="logo-img">
        <h1 style="text-align: center;">Central de Passos a Passos</h1>
    </header>

    <div class="container">
        <div class="left-column">
            <div class="card card-cadastro">
                <h3 id="formTitle">Cadastrar Novo Processo</h3>
                <select id="empresaCadastro">
                    <option value="Aesy" class="opt-aesy">Aesy</option>
                    <option value="Plamev" class="opt-plamev">Plamev</option>
                    <option value="Premium" class="opt-premium">Premium</option>
                </select>
                <input type="text" id="tituloProcesso" placeholder="Título do Passo a Passo (ex: Cadastro de Categoria)">
                <textarea id="descricaoProcesso" placeholder="Escreva o passo a passo detalhado aqui..." rows="10"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button id="saveUpdateBtn" onclick="handleSaveUpdate()">Salvar no Sistema</button>
                    <button id="cancelEditBtn" onclick="cancelarEdicao()" style="background-color: #666; display: none;">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="card card-filtros">
                <h3 style="margin-bottom: 15px;">Filtrar e Pesquisar</h3>
                <div class="filtros-container">
                    <select id="filtroEmpresa" onchange="renderizarLista()">
                        <option value="todos">Selecione uma Empresa</option>
                        <option value="Aesy" class="opt-aesy">Aesy</option>
                        <option value="Plamev" class="opt-plamev">Plamev</option>
                        <option value="Premium" class="opt-premium">Premium</option>
                    </select>
                    <input type="text" id="buscaProcesso" placeholder="Digite para buscar..." onkeyup="renderizarLista()">
                </div>
            </div>
            <div id="listaContainer"></div>
        </div>
    </div>
</div>

<div id="modalVisualizar" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModal()">&times;</span>
        <span id="modalTag" class="tag">Empresa</span>
        <h2 id="modalTitulo">Título</h2>
        <div id="modalDescricao" class="modal-body"></div>
        <button class="btn-copiar" onclick="copiarConteudo()">Copiar Passo a Passo</button>
    </div>
</div>
</body>
</html>
